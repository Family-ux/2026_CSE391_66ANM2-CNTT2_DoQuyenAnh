<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
      <script src="https://ajax.aspnetcdn.com/ajax/jQuery/jquery-3.2.1.min.js"></script>
	    <script src="http://ajax.aspnetcdn.com/ajax/jquery.validate/1.9/jquery.validate.min.js" type="text/javascript"></script>
	    <script src="main.js" type="text/javascript"></script>
</head>
<body>
   <form id="registerForm">
    <div>
        <label>Họ và tên</label>
        <input type="text" id="fullname">
        <span id="fullname-error" class="error-msg"></span>
    </div>
    <div>
        <label>Email</label>
        <input type="text" id="email">
        <span id="email-error" class="error-msg"></span>
    </div>
    <div>
        <label>Số điện thoại</label>
        <input type="text" id="phone">
        <span id="phone-error" class="error-msg"></span>
    </div>
    <div>
        <label>Mật khẩu</label>
        <input type="password" id="password">
        <span id="password-error" class="error-msg"></span>
    </div>
    <div>
        <label>Xác nhận mật khẩu</label>
        <input type="password" id="confirmPassword">
        <span id="confirmPassword-error" class="error-msg"></span>
    </div>
    <div>
        <label>Giới tính:</label>
        <input type="radio" name="gender" value="Nam"> Nam
        <input type="radio" name="gender" value="Nữ"> Nữ
        <span id="gender-error" class="error-msg"></span>
    </div>
    <div>
        <input type="checkbox" id="terms"> Tôi đồng ý với điều khoản
        <span id="terms-error" class="error-msg"></span>
    </div>
    <button type="submit">Đăng ký</button>
</form>
<div id="successMsg" style="display:none;"></div>
</body>
</html>

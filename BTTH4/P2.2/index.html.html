<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="style2_2.css">
     <script src="https://ajax.aspnetcdn.com/ajax/jQuery/jquery-3.2.1.min.js"></script>
	    <script src="http://ajax.aspnetcdn.com/ajax/jquery.validate/1.9/jquery.validate.min.js" type="text/javascript"></script>
	    <script src="main2_2.js" type="text/javascript"></script>
</head>
<body>
    <h1>Form đăng kí đặt hàng trực tuyến</h1>
    <form action="register" action = "register ">
       <div id="method">
            <label for="">Chọn món ăn</label>
            <select name="select" id="select">
                <option value="">--Chọn sản phẩm--</option>
                 <option value="1">Pizza</option>
                 <option value="2">Cocacola</option>
                 <option value="3">Pessi</option>
             </select>
             <span id="select-error" class = "error mess"></span>
       </div>
       <div>
            <label for="">Số lượng</label>
            <input type="number" id = "number" min = 1 max = 99>
            <span id = "number-error" class = "error mess"></span>
       </div>
       <div>
            <label for="">Ngày giao hàng</label>
            <input type="date" id = "date">
            <span id = "date-error" class = "date mess"></span>
       </div>
       <div>
            <label for="">Địa chỉ giao hàng</label>
            <input type="text" id = "address">
            <span id = "address-error" class = "error mess"></span>

       </div>
       <div>
            <label for="">Ghi chú</label>
            <textarea name="note" id="note" ></textarea>
            <div id = "note-count">0</div>/200
            <span id = "note-error" class = "error mess"></span>
        </div>
        <div id = "method">
            <label for="">Phương thức thanh toán</label>
            <input type="radio" name = "method"  value="COD">COD
            <input type="radio" name = "method"  value="Chuyển khoản">Chuyển khoản
            <input type="radio" name = "method" value="VĐT">Ví điện tử
            <span id = "method-error" class = "error mess"></span>
        </div>
        <button>Gửi</button>
    </form>
    <div>
        <label>Tổng tiền:</label>
        <span id="total-price">0</span> VND
    </div>
    <div id="confirm-box" style="display:none; border:1px solid black; padding:10px; margin-top:10px;">
         <h3>Thông tin đơn hàng</h3>

        <p>Sản phẩm: <span id="cf-product"></span></p>
         <p>Số lượng: <span id="cf-quantity"></span></p>
        <p>Tổng tiền: <span id="cf-total"></span> VND</p>
         <p>Ngày giao: <span id="cf-date"></span></p>

        <p><b>Xác nhận đặt hàng?</b></p>

         <button id="confirm-btn">Xác nhận</button>
        <button id="cancel-btn">Hủy</button>
     </div>
</body>
</html>

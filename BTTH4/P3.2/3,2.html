<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://ajax.aspnetcdn.com/ajax/jQuery/jquery-3.2.1.min.js"></script>
	    <script src="http://ajax.aspnetcdn.com/ajax/jquery.validate/1.9/jquery.validate.min.js" type="text/javascript"></script>
	    <script src="main3-2.js" type="text/javascript"></script>
        <link rel="stylesheet" href="style3-2.css">
    <title>Document</title>
</head>
<body>
    <form id="multiForm">


<div id="progress">
    Bước <span id="step-number">1</span>/3
</div>


<div class="step" id="step1">
    <h3>Thông tin cá nhân</h3>

    <label>Họ tên</label>
    <input type="text" id="fullname">

    <label>Ngày sinh</label>
    <input type="date" id="birthday">

    <label>Giới tính</label>
    <input type="radio" name="gender" value="Nam"> Nam
    <input type="radio" name="gender" value="Nữ"> Nữ

    <br><br>
    <button type="button" id="next1">Tiếp theo</button>
</div>


<div class="step" id="step2">

    <h3>Thông tin tài khoản</h3>

    <label>Email</label>
    <input type="text" id="email">

    <label>Mật khẩu</label>
    <input type="password" id="password">

    <label>Xác nhận mật khẩu</label>
    <input type="password" id="confirmPassword">

    <br><br>
    <button type="button" id="back1">Quay lại</button>
    <button type="button" id="next2">Tiếp theo</button>

</div>


<div class="step" id="step3">

    <h3>Xác nhận thông tin</h3>

    <p>Họ tên: <span id="cf-name"></span></p>
    <p>Ngày sinh: <span id="cf-birthday"></span></p>
    <p>Giới tính: <span id="cf-gender"></span></p>
    <p>Email: <span id="cf-email"></span></p>

    <br>

    <button type="button" id="back2">Quay lại</button>
    <button type="submit">Đăng ký</button>

</div>

</form>
</body>
</html>

<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Quản lý đặt phòng</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="container">
    <div class="topbar">
      <h1>Quản lý Đặt phòng Khách sạn</h1>
      <div class="top-actions">
        <a href="add-booking.html" class="btn btn-primary">Thêm đặt phòng</a>
        <a href="bookings.html" class="btn btn-secondary">Quản lý đặt phòng</a>
      </div>
    </div>

    <div class="card">
      <h2>Danh sách đặt phòng</h2>

      <div class="search-row">
        <input type="text" id="searchInput" placeholder="Tìm mã đặt phòng hoặc tên khách" />
        <button class="btn btn-light" id="clearSearchBtn">Tải lại</button>
      </div>

      <div class="stats">
        <div class="stat-box">
          <strong id="totalBookings">0</strong>
          <span>Tổng booking</span>
        </div>
        <div class="stat-box">
          <strong id="availableRooms">100</strong>
          <span>Phòng trống ước tính</span>
        </div>
        <div class="stat-box">
          <strong id="estimatedRevenue">0</strong>
          <span>Doanh thu dự kiến (VNĐ)</span>
        </div>
      </div>

      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th>Mã</th>
              <th>Khách</th>
              <th>SĐT</th>
              <th>Loại</th>
              <th>Check-in</th>
              <th>Check-out</th>
              <th>Người lớn/Trẻ em</th>
              <th>Promo</th>
              <th>Trạng thái</th>
              <th>Actions</th>
            </tr>
          </thead>
          <tbody id="bookingTableBody"></tbody>
        </table>
      </div>
    </div>
  </div>

  <div id="toastContainer" class="toast-container"></div>

  <script src="script.js"></script>
</body>
</html>

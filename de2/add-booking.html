<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Thêm / Cập nhật đặt phòng</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="container">
    <div class="topbar">
      <h1>Quản lý Đặt phòng Khách sạn</h1>
      <div class="top-actions">
        <a href="add-booking.html" class="btn btn-primary">Thêm đặt phòng</a>
        <a href="bookings.html" class="btn btn-secondary">Quản lý đặt phòng</a>
      </div>
    </div>

    <div class="card">
      <h2>Thêm / Cập nhật đặt phòng</h2>

      <form id="bookingForm">
        <h3>Thông tin cơ bản</h3>
        <div class="form-grid">
          <div class="form-group">
            <label>Mã đặt phòng</label>
            <input type="text" id="bookingId" placeholder="PH123456" />
            <small>PH + 6 chữ số</small>
            <span class="error" id="bookingIdError"></span>
          </div>

          <div class="form-group">
            <label>Họ tên khách</label>
            <input type="text" id="customerName" placeholder="Nguyen Van A" />
            <small>2-50 ký tự, chỉ chữ và khoảng trắng</small>
            <span class="error" id="customerNameError"></span>
          </div>

          <div class="form-group">
            <label>Số điện thoại</label>
            <input type="text" id="phone" placeholder="0987654321" />
            <small>10 số, bắt đầu 0</small>
            <span class="error" id="phoneError"></span>
          </div>

          <div class="form-group">
            <label>Loại phòng</label>
            <select id="roomType">
              <option value="">Chọn loại phòng</option>
              <option value="Standard">Standard</option>
              <option value="Deluxe">Deluxe</option>
              <option value="Suite">Suite</option>
              <option value="VIP">VIP</option>
            </select>
            <span class="error" id="roomTypeError"></span>
          </div>
        </div>

        <h3>Thời gian</h3>
        <div class="form-grid">
          <div class="form-group">
            <label>Ngày nhận phòng</label>
            <input type="date" id="checkIn" />
            <small>Không trống, phải từ hôm nay</small>
            <span class="error" id="checkInError"></span>
          </div>

          <div class="form-group">
            <label>Ngày trả phòng</label>
            <input type="date" id="checkOut" />
            <small>Ít nhất 1 ngày, không quá 30 ngày</small>
            <span class="error" id="checkOutError"></span>
          </div>

          <div class="form-group">
            <label>Số người lớn</label>
            <input type="number" id="adults" min="1" max="4" value="1" />
            <span class="error" id="adultsError"></span>
          </div>

          <div class="form-group">
            <label>Số trẻ em</label>
            <input type="number" id="children" min="0" max="6" value="0" />
            <span class="error" id="childrenError"></span>
          </div>
        </div>

        <h3>Khuyến mãi</h3>
        <div class="form-grid">
          <div class="form-group">
            <label>Mã khuyến mãi</label>
            <input type="text" id="promoCode" placeholder="SAVE20%" />
            <small>8 ký tự, format SAVE20%</small>
            <span class="error" id="promoCodeError"></span>
          </div>

          <div class="form-group">
            <label>Xác nhận mã</label>
            <input type="text" id="confirmPromo" placeholder="Nhập lại mã" />
            <span class="error" id="confirmPromoError"></span>
          </div>
        </div>

        <div class="form-actions">
          <button type="submit" class="btn btn-primary" id="submitBtn">Lưu đặt phòng</button>
          <button type="button" class="btn btn-light" id="resetBtn">Làm mới</button>
        </div>
      </form>
    </div>
  </div>

  <div id="toastContainer" class="toast-container"></div>

  <script src="script.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        body{
            font-family: Arial, san-serif;
            padding: 40px;
        }
        input,textarea{
            width: 100%;
            padding: 10px;
            margin-bottom: 15px;
            border: 1px solid #ccc;
            border-radius: 3px;
            font-size: 14px ;
            box-sizing: border-box;
        }
        textarea{
            height: 150px;
            resize: vertical;
        }
        .contact-container{
            width: 700px;
            margin: 50px auto;
            padding: 25px;
            border: 1px solid #333;
            background: #f5f5f5;
        }
        .row{
            display: flex;
            gap: 15px ;
        }
        .btn-submit {
             background: #5bc0de;
             border: 1px solid #46b8da;
            color: #fff;
             padding: 10px 18px;
            border-radius: 4px;
             font-size: 14px;
            cursor: pointer;
        }

        .btn-submit:hover {
             background: #31b0d5;
        }
        .form-footer {
             display: flex;
            justify-content: space-between;
             align-items: center;
             margin-top: 10px;
            font-size: 13px;
             color: #777;
        }
    </style>
</head>
<body>
    <div class = "contact-container">
        <h3>Get in touch with us by filling contact form below </h3>
         <div class = "row" >
             <input type = "text" placeholder="*Enter your full name" >
            <input type = "text" placeholder="*Enter your email address" ><br>
         </div>
        <input type="text" placeholder="Enter your subject" ><br>
        <textarea placeholder="*Your messenge here"></textarea>
        <div class="form-footer">
            <button type="submit" class="btn-submit">Send message</button>
            <span>* Please fill all required form field, thanks!</span>
        </div>
    </div>
</body>
</html>
